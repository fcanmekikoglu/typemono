<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1418" />
    <title>Typemono</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme = stored === 'github' || stored === 'light' || stored === 'dark' ? stored : 'light'
          var colorScheme = (theme === 'dark' || theme === 'github') ? 'dark' : 'light'
          var root = document.documentElement
          root.classList.remove('github', 'light', 'dark')
          root.classList.add(theme)
          root.classList.add(colorScheme)
          root.setAttribute('data-theme', theme)
          root.style.colorScheme = colorScheme
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
