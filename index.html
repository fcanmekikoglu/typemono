<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/images/ios/32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/images/ios/16.png" />
    <link rel="apple-touch-icon" href="/images/ios/180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/images/ios/152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/ios/180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/images/ios/167.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1418" />
    <title>Typemono</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme = stored === 'light' || stored === 'dark' ? stored : 'dark'
          var colorScheme = theme === 'dark' ? 'dark' : 'light'
          var root = document.documentElement
          root.classList.remove('light', 'dark')
          root.classList.add(theme)
          root.classList.add(colorScheme)
          root.setAttribute('data-theme', theme)
          root.style.colorScheme = colorScheme
          var locale = localStorage.getItem('locale')
          if (locale !== 'en' && locale !== 'tr') {
            locale = (navigator.language || 'en').slice(0, 2).toLowerCase()
            if (locale !== 'tr') locale = 'en'
          }
          root.setAttribute('lang', locale)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
